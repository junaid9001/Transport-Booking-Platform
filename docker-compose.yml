services:
  api-gateway: 
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env  
    environment:
      - "REDIS_HOST=redis"  
      - "REDIS_PORT=6379"  
    depends_on:
      - redis
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always  
    