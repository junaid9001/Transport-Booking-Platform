  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
      - "50051:50051"
    env_file:
      - ./payment-service/.env
    environment:
      - "KAFKA_BROKERS=redpanda:9092"
    depends_on:
      - redis
      - redpanda

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    expose:
      - 8086
    env_file:
      - ./chat-service/.env
    environment:
      DATABASE_URL: ${CHAT_DB}
    depends_on:
      - redis

  qr-service:
    build:
      context: ./qr-service
      dockerfile: Dockerfile
    expose:
      - 8087
